# Деплой на https://render.com без SSH (см. RAZVERNYVANIE-PROSTO.md)
services:
  - type: web
    name: sber-pomoshnik
    runtime: node
    plan: free
    # Импорт SQLite ~6 GB; на free tier может не хватить RAM — тогда поиск идёт по CSV
    buildCommand: npm run zalog:install && (node scripts/import-deals-sqlite.mjs || echo "deals sqlite import skipped")
    startCommand: npm start
    envVars:
      - key: GIGACHAT_SCOPE
        value: GIGACHAT_API_PERS
      - key: GIGACHAT_MODEL
        value: GigaChat
      - key: NODE_VERSION
        value: "22"
      - key: GIGACHAT_CREDENTIALS
        sync: false
      - key: GIGACHAT_ENABLED
        value: "true"
      - key: LANGFLOW_API_KEY
        sync: false
      - key: LANGFLOW_RUN_URL
        sync: false
