<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Данные о сделках с недвижимостью — СберБизнес Помощник</title>
    <script>(function(){try{if(localStorage.getItem("sber-pomoshnik:theme")==="dark")document.documentElement.setAttribute("data-theme","dark");}catch(e){}})();</script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.cdnfonts.com/css/sb-sans-interface" rel="stylesheet">
    
    <script src="/vendor/xlsx.full.min.js"></script>
    <style>
        :root {
            --sber-green: #21A038;
            --sber-bg: #F0F4F8;
            --sber-card: #FFFFFF;
            --sber-text: #1E2A3A;
            --sber-muted: #617188;
            --sber-border: #E2EAF2;
            --radius: 20px;
        }
        body {
            font-family: 'SB Sans Interface', system-ui, sans-serif;
            background: var(--sber-bg);
            color: var(--sber-text);
            min-height: 100vh;
        }
        .hero {
            background: linear-gradient(135deg, #1E2A3A 0%, #243447 100%);
            color: #fff;
            border-bottom: 3px solid var(--sber-green);
            padding: 2rem 0 2.5rem;
        }
        .card-panel {
            background: var(--sber-card);
            border: 1px solid var(--sber-border);
            border-radius: var(--radius);
            box-shadow: 0 4px 24px rgba(30, 42, 58, 0.06);
        }
        .btn-sber {
            background: var(--sber-green);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
        }
        .btn-sber:hover { background: #1B8A32; color: #fff; }
        .info-label {
            font-size: 0.8rem;
            color: var(--sber-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .stat-value {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--sber-green);
        }
        .deals-table {
            font-size: 0.82rem;
            table-layout: fixed;
            width: 100%;
        }
        .deals-table th {
            white-space: normal;
            vertical-align: bottom;
            font-size: 0.75rem;
            line-height: 1.25;
        }
        .deals-table td {
            vertical-align: middle;
            overflow-wrap: anywhere;
            word-break: break-word;
        }
        .deals-table .col-period { width: 6.5%; }
        .deals-table .col-quarter { width: 9%; font-variant-numeric: tabular-nums; }
        .deals-table .col-city { width: 9%; }
        .deals-table .col-street { width: 14%; }
        .deals-table .col-year { width: 6%; }
        .deals-table .col-op { width: 7%; }
        .deals-table .col-type { width: 8%; }
        .deals-table .col-purpose { width: 8%; }
        .deals-table .col-area { width: 6.5%; }
        .deals-table .col-price { width: 9%; }
        .deals-table .col-psqm { width: 7%; }
        .deals-table .col-doc { width: 9.5%; }
        .deals-table .text-num {
            text-align: right;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }
        .deals-table .text-money {
            text-align: right;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }
        .deals-table td.text-money--sum {
            font-weight: 600;
            color: var(--sber-text);
        }
        .deals-table td.text-money--muted {
            color: var(--sber-muted);
            font-size: 0.8rem;
        }
        .deals-table th.sortable {
            cursor: pointer;
            user-select: none;
        }
        .deals-table th.sortable:hover {
            color: var(--sber-green);
        }
        .deals-table th .sort-ind {
            display: inline-block;
            margin-left: 0.2em;
            font-size: 0.7em;
            opacity: 0.35;
            line-height: 1;
        }
        .deals-table th.sort-asc .sort-ind,
        .deals-table th.sort-desc .sort-ind {
            opacity: 1;
            color: var(--sber-green);
        }
        .filter-row th {
            background: #f8fafc;
            font-weight: normal;
            padding: 0.35rem 0.25rem;
            vertical-align: middle;
        }
        .filter-row .form-select,
        .filter-row .form-control {
            font-size: 0.75rem;
            padding: 0.2rem 0.35rem;
            min-width: 0;
            width: 100%;
        }
        .filter-row .filter-hint {
            display: block;
            font-size: 0.62rem;
            color: var(--sber-muted);
            margin-top: 0.15rem;
            line-height: 1.2;
        }
        .export-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
            justify-content: space-between;
        }
        .year-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            align-items: center;
        }
        .object-type-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem 1.5rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #e8edf2;
        }
        .object-type-filters .form-check {
            margin-bottom: 0;
        }
        .search-input-group {
            display: flex;
            align-items: stretch;
            gap: 0.75rem;
        }
        .search-input-group .form-control {
            min-width: 0;
            flex: 1 1 auto;
        }
        .search-input-group .btn-search {
            white-space: nowrap;
            align-self: stretch;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            padding-left: 1.25rem;
            padding-right: 1.25rem;
        }
        @media (max-width: 576px) {
            .search-input-group {
                flex-direction: column;
            }
            .search-input-group .btn-search {
                width: 100%;
            }
        }
        .search-loading {
            display: none;
            align-items: center;
            gap: 1.25rem;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff 0%, #f5faf7 100%);
            border: 1px solid var(--sber-border);
            border-radius: var(--radius);
            box-shadow: 0 4px 24px rgba(30, 42, 58, 0.06);
        }
        .search-loading.active { display: flex; }
        .loader-gif {
            width: 88px;
            height: 88px;
            flex-shrink: 0;
            border-radius: 14px;
            object-fit: contain;
            background: transparent;
        }
        .search-loading-body {
            flex: 1;
            min-width: 0;
        }
        .search-loading-title {
            font-weight: 600;
            font-size: 1rem;
            color: var(--sber-text);
            margin: 0 0 0.25rem;
        }
        .search-loading-text {
            color: var(--sber-muted);
            font-size: 0.9rem;
            margin: 0 0 0.65rem;
        }
        .loader-progress {
            height: 4px;
            background: var(--sber-border);
            border-radius: 4px;
            overflow: hidden;
        }
        .loader-progress-bar {
            height: 100%;
            width: 35%;
            background: linear-gradient(90deg, var(--sber-green), #3dd15a);
            border-radius: 4px;
            animation: loader-slide 1.4s ease-in-out infinite;
        }
        @keyframes loader-slide {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(320%); }
        }
    </style>
    <link rel="stylesheet" href="/theme.css?v=11">
</head>
<body>
    <header class="hero">
        <div class="container">
            <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
                <div>
                    <p class="small mb-1 opacity-75"><a href="/" style="color:inherit;text-decoration:none">СберБизнес Помощник</a> · сопровождение 2.0</p>
                    <h1 class="h3 mb-0"><i class="fa-solid fa-handshake me-2 text-success"></i>Данные о сделках с недвижимостью</h1>
                </div>
                <div class="d-flex flex-wrap align-items-center gap-2">
                    <div class="theme-toggle-standalone">
                        <div class="form-check form-switch theme-toggle-wrap mb-0" title="Светлая или тёмная тема">
                            <input class="form-check-input" type="checkbox" role="switch" id="themeToggle" data-theme-toggle>
                            <label class="form-check-label" for="themeToggle">
                                <i class="fas fa-moon theme-toggle-icon" data-theme-icon aria-hidden="true"></i>
                                <span data-theme-label>Светлая</span>
                            </label>
                        </div>
                    </div>
                    <a href="/?view=services" class="btn btn-outline-light btn-sm">← СберБизнес Помощник</a>
                </div>
            </div>
        </div>
    </header>

    <main class="container py-4">
        <section class="card-panel p-4 mb-4">
            <form id="searchForm">
                <label for="quarterInput" class="form-label fw-semibold">Кадастровый квартал</label>
                <div class="search-input-group">
                    <input type="text" class="form-control form-control-lg" id="quarterInput"
                           placeholder="XX:XX:XXXXXXX" required>
                    <button type="submit" class="btn btn-sber btn-lg btn-search" id="searchBtn">
                        <i class="fa-solid fa-magnifying-glass me-2"></i>Найти
                    </button>
                </div>
                <div class="form-text mt-2">Формат: XX:XX:XXXXXXX. Можно вставить полный кадастровый номер — возьмём квартал автоматически.</div>
                <fieldset class="object-type-filters">
                    <legend class="form-label fw-semibold mb-2 fs-6">Что искать</legend>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="operationDeal" value="deal">
                        <label class="form-check-label" for="operationDeal">Продажа</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="operationRent" value="rent">
                        <label class="form-check-label" for="operationRent">Аренда</label>
                    </div>
                </fieldset>
                <fieldset class="object-type-filters">
                    <legend class="form-label fw-semibold mb-2 fs-6">Тип объекта</legend>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="objectTypeLand" value="002001001000">
                        <label class="form-check-label" for="objectTypeLand">ЗУ</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="objectTypeBuilding" value="002001002000">
                        <label class="form-check-label" for="objectTypeBuilding">Здание</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="objectTypePremises" value="002001003000">
                        <label class="form-check-label" for="objectTypePremises">Помещение</label>
                    </div>
                </fieldset>
            </form>
        </section>

        <div id="searchLoading" class="search-loading" aria-live="polite" aria-busy="false">
            <img
                class="loader-gif"
                id="searchLoaderGif"
                src="/assets/loading-sbercat.gif"
                width="88"
                height="88"
                alt="Сберкот ищет продажи"
                onerror="this.onerror=null;this.src='https://gifs.obs.ru-moscow-1.hc.sbercloud.ru/f61fbd71aa1b7d2456a24782a6af8553657c341a6d7e02d28f23205097d4b44b.gif'"
            >
            <div class="search-loading-body">
                <p class="search-loading-title">Ищем продажи по кварталу</p>
                <p class="search-loading-text mb-0" id="searchLoadingText">Сканируем датасеты Росреестра…</p>
                <div class="loader-progress" aria-hidden="true">
                    <div class="loader-progress-bar"></div>
                </div>
            </div>
        </div>

        <div id="alertBox"></div>
        <div id="results" class="d-none"></div>
    </main>

    <script>
        const API_BASE = (() => {
            try {
                if (location.protocol === "http:" || location.protocol === "https:") return location.origin;
            } catch (_) { /* ignore */ }
            return "http://localhost:8787";
        })();

        const CATEGORY_ORDER = [
            { id: "land", label: "Земельные участки" },
            { id: "house", label: "Жилые дома" },
            { id: "nonres", label: "Нежилые здания/помещения" },
            { id: "flat", label: "Жилые помещения" },
            { id: "parking", label: "Машиноместа" }
        ];

        const TABLE_COLUMNS = [
            { key: "periodShortLabel", title: "Дата", colClass: "col-period" },
            { key: "quarter_cad_number", title: "Кадастровый квартал", colClass: "col-quarter" },
            { key: "city", title: "Город", colClass: "col-city" },
            { key: "street", title: "Улица", colClass: "col-street" },
            { key: "year_build", title: "Год постройки", colClass: "col-year", align: "end", format: "year" },
            { key: "operationKind", title: "Операция", colClass: "col-op" },
            { key: "realestateTypeLabel", title: "Тип объекта", colClass: "col-type" },
            { key: "purposeLabel", title: "Вид объекта", colClass: "col-purpose", format: "purpose" },
            { key: "area", title: "Площадь, м²", colClass: "col-area", align: "end", format: "area" },
            { key: "deal_price", title: "Сумма", colClass: "col-price", align: "end", format: "money" },
            { key: "pricePerSqm", title: "₽/м²", colClass: "col-psqm", align: "end", format: "moneyMuted" },
            { key: "doc_type", title: "Тип документа", colClass: "col-doc" }
        ];

        const NUMERIC_FILTERS = new Set(["areaMin", "areaMax", "priceMin", "priceMax"]);
        const YEAR_BUILD_FILTERS = new Set(["yearBuildMin", "yearBuildMax"]);
        const TEXT_INPUT_FILTERS = new Set(["street"]);

        const EXPORT_COLUMNS = TABLE_COLUMNS;

        const YEAR_LOAD_ORDER = [2026, 2025, 2024];
        const DEFAULT_FIRST_YEAR = 2026;

        let searchState = {
            quarterCadNumber: "",
            allDeals: [],
            availableYears: [...YEAR_LOAD_ORDER],
            loadedYears: new Set(),
            yearNotes: [],
            objectTypes: [],
            operationKinds: ["deal", "rent"],
            meta: {},
            filters: {},
            sort: { key: null, dir: "asc" }
        };

        function getSelectedObjectTypes() {
            return ["objectTypeLand", "objectTypeBuilding", "objectTypePremises"]
                .map((id) => document.getElementById(id))
                .filter((el) => el?.checked)
                .map((el) => el.value);
        }

        function getSelectedOperationKinds() {
            const kinds = [];
            if (document.getElementById("operationDeal")?.checked) kinds.push("deal");
            if (document.getElementById("operationRent")?.checked) kinds.push("rent");
            return kinds;
        }

        const LOADING_MESSAGES = [
            "Сканируем датасеты Росреестра…",
            "Отбираем записи по кадастровому кварталу…",
            "Проверяем продажи и договоры аренды…",
            "Группируем данные по периодам…",
            "Формируем сводку…"
        ];
        let loadingMessageTimer = null;
        let loadingMessageIndex = 0;

        function showSearchLoading() {
            const box = document.getElementById("searchLoading");
            const text = document.getElementById("searchLoadingText");
            loadingMessageIndex = 0;
            text.textContent = LOADING_MESSAGES[0];
            box.classList.add("active");
            box.setAttribute("aria-busy", "true");
            clearInterval(loadingMessageTimer);
            loadingMessageTimer = setInterval(() => {
                loadingMessageIndex = (loadingMessageIndex + 1) % LOADING_MESSAGES.length;
                text.textContent = LOADING_MESSAGES[loadingMessageIndex];
            }, 2200);
        }

        function sleep(ms) {
            return new Promise((resolve) => setTimeout(resolve, ms));
        }

        async function fetchWithRetry(url, options, retries = 4) {
            let lastErr;
            for (let i = 0; i < retries; i++) {
                try {
                    return await fetch(url, options);
                } catch (err) {
                    lastErr = err;
                    if (i < retries - 1) await sleep(2500 * (i + 1));
                }
            }
            throw lastErr;
        }

        async function pollDealsJob(jobId, year) {
            const text = document.getElementById("searchLoadingText");
            const yearLabel = year ? ` за ${year} год` : "";
            for (let attempt = 0; attempt < 90; attempt++) {
                await sleep(2000);
                const st = await fetchWithRetry(
                    `${API_BASE}/api/deals/search/status/${encodeURIComponent(jobId)}`
                );
                const raw = await st.text();
                let job;
                try {
                    job = raw ? JSON.parse(raw) : {};
                } catch {
                    throw new Error("Сервер вернул неверный ответ при проверке статуса");
                }
                if (!st.ok) throw new Error(job.error || `HTTP ${st.status}`);
                if (job.status === "done") return job.result;
                if (job.status === "error") throw new Error(job.error || "Ошибка поиска");
                const sec = (attempt + 1) * 2;
                text.textContent = `Сканируем датасеты Росреестра${yearLabel}… (${sec} с)`;
            }
            throw new Error("Поиск занял слишком много времени. Попробуйте ещё раз.");
        }

        function hideSearchLoading() {
            const box = document.getElementById("searchLoading");
            clearInterval(loadingMessageTimer);
            loadingMessageTimer = null;
            box.classList.remove("active");
            box.setAttribute("aria-busy", "false");
        }

        function escapeHtml(s) {
            return String(s ?? "").replace(/[&<>"']/g, (c) => ({
                "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
            })[c]);
        }

        function formatMoney(n) {
            if (n == null || !Number.isFinite(n)) return "—";
            return Number(n).toLocaleString("ru-RU") + " ₽";
        }

        function formatMoneyPlain(n) {
            if (n == null || !Number.isFinite(n)) return "";
            return Number(n);
        }

        function formatDate(value) {
            if (!value) return "—";
            const m = String(value).match(/^(\d{4})-(\d{2})-(\d{2})/);
            if (m) return `${m[3]}.${m[2]}.${m[1]}`;
            return String(value);
        }

        function formatDatePlain(value) {
            if (!value) return "";
            const m = String(value).match(/^(\d{4})-(\d{2})-(\d{2})/);
            if (m) return `${m[3]}.${m[2]}.${m[1]}`;
            return String(value);
        }

        function formatArea(n) {
            if (n == null || !Number.isFinite(Number(n))) return "—";
            return Number(n).toLocaleString("ru-RU", { minimumFractionDigits: 0, maximumFractionDigits: 2 });
        }

        function formatYearValue(n) {
            if (n == null || n === "") return "—";
            const y = Number(n);
            return Number.isFinite(y) ? String(Math.round(y)) : "—";
        }

        function parseFilterNumber(value) {
            const s = String(value ?? "").trim().replace(/\s/g, "").replace(",", ".");
            if (s === "") return null;
            const n = Number(s);
            return Number.isFinite(n) ? n : null;
        }

        function objectKindLabel(d) {
            return d.purposeLabel || d.categoryLabel || "";
        }

        function periodDisplay(d) {
            if (d.periodShortLabel) return d.periodShortLabel;
            const m = String(d.periodLabel || "").match(/^(\d)\s+квартал\s+(\d{4})/);
            if (m) return `${m[1]} кв ${m[2]}`;
            return d.periodLabel || "—";
        }

        function formatDealCell(d, col) {
            if (col.key === "periodShortLabel") {
                return escapeHtml(periodDisplay(d));
            }
            switch (col.format) {
                case "date":
                    return formatDate(d[col.key]);
                case "purpose":
                    return escapeHtml(objectKindLabel(d) || "—");
                case "money":
                    return formatMoney(d[col.key]);
                case "moneyMuted":
                    return formatMoney(d[col.key]);
                case "area":
                    return formatArea(d[col.key]);
                case "year":
                    return formatYearValue(d[col.key]);
                case "number":
                    return d[col.key] != null ? escapeHtml(d[col.key]) : "—";
                default:
                    return escapeHtml(d[col.key] || "—");
            }
        }

        function exportDealValue(d, col) {
            if (col.key === "periodShortLabel") {
                const v = periodDisplay(d);
                return v === "—" ? "" : v;
            }
            switch (col.format) {
                case "date":
                    return formatDatePlain(d[col.key]);
                case "purpose":
                    return objectKindLabel(d);
                case "money":
                    return formatMoneyPlain(d[col.key]);
                case "moneyMuted":
                    return formatMoneyPlain(d[col.key]);
                case "area":
                    return d[col.key] ?? "";
                case "year":
                    return d[col.key] ?? "";
                default:
                    return d[col.key] || "";
            }
        }

        function statsForDeals(deals) {
            const prices = deals.map((d) => d.deal_price).filter((p) => p != null && p > 0);
            const sum = prices.reduce((a, b) => a + b, 0);
            const withArea = deals.filter((d) => d.deal_price > 0 && d.area > 0);
            const totalArea = withArea.reduce((a, d) => a + d.area, 0);
            const totalPriceForArea = withArea.reduce((a, d) => a + d.deal_price, 0);
            const pricePerSqmAvg = totalArea > 0 ? Math.round(totalPriceForArea / totalArea) : null;
            return {
                count: deals.length,
                priceMin: prices.length ? Math.min(...prices) : null,
                priceMax: prices.length ? Math.max(...prices) : null,
                priceAvg: prices.length ? Math.round(sum / prices.length) : null,
                priceSum: prices.length ? Math.round(sum) : null,
                pricePerSqmAvg
            };
        }

        function buildClientStats(deals) {
            const byCategory = {};
            for (const cat of CATEGORY_ORDER) {
                byCategory[cat.id] = {
                    label: cat.label,
                    ...statsForDeals(deals.filter((d) => d.categoryId === cat.id))
                };
            }
            const overall = statsForDeals(deals);
            return {
                total: overall.count,
                priceMin: overall.priceMin,
                priceMax: overall.priceMax,
                priceAvg: overall.priceAvg,
                priceSum: overall.priceSum,
                pricePerSqmAvg: overall.pricePerSqmAvg,
                byCategory
            };
        }

        function uniqueValues(deals, key) {
            return [...new Set(deals.map((d) => d[key]).filter(Boolean))].sort((a, b) =>
                String(a).localeCompare(String(b), "ru")
            );
        }

        function isYearBuildFilterReady(value) {
            const s = String(value ?? "").trim();
            return s === "" || /^\d{4}$/.test(s);
        }

        function yearBuildInputFilter(id, placeholder, current) {
            return `<input type="text" inputmode="numeric" maxlength="4" class="form-control form-control-sm" data-filter="${id}" placeholder="${escapeHtml(placeholder)}" value="${escapeHtml(current || "")}" aria-label="Фильтр года постройки"><span class="filter-hint">Enter</span>`;
        }

        function numericInputFilter(id, placeholder, current) {
            return `<input type="text" inputmode="decimal" class="form-control form-control-sm" data-filter="${id}" placeholder="${escapeHtml(placeholder)}" value="${escapeHtml(current || "")}" aria-label="Числовой фильтр"><span class="filter-hint">Enter</span>`;
        }

        function getFilteredDeals() {
            const f = searchState.filters;
            return searchState.allDeals.filter((d) => {
                if (f.period && periodDisplay(d) !== f.period) return false;
                if (f.city && d.city !== f.city) return false;
                if (f.docType && d.doc_type !== f.docType) return false;
                if (f.operationKind && d.operationKind !== f.operationKind) return false;
                if (f.objectType && d.realestateTypeLabel !== f.objectType) return false;
                if (f.purposeLabel && objectKindLabel(d) !== f.purposeLabel) return false;
                if (f.street) {
                    const street = String(d.street || "").toLowerCase();
                    if (!street.includes(f.street.toLowerCase())) return false;
                }
                if (isYearBuildFilterReady(f.yearBuildMin) && String(f.yearBuildMin).trim() !== "") {
                    const year = d.year_build != null ? Number(d.year_build) : NaN;
                    if (!Number.isFinite(year) || year < Number(f.yearBuildMin)) return false;
                }
                if (isYearBuildFilterReady(f.yearBuildMax) && String(f.yearBuildMax).trim() !== "") {
                    const year = d.year_build != null ? Number(d.year_build) : NaN;
                    if (!Number.isFinite(year) || year > Number(f.yearBuildMax)) return false;
                }
                if (f.areaMin !== "" && f.areaMin != null) {
                    const min = parseFilterNumber(f.areaMin);
                    if (min != null && (d.area == null || d.area < min)) return false;
                }
                if (f.areaMax !== "" && f.areaMax != null) {
                    const max = parseFilterNumber(f.areaMax);
                    if (max != null && (d.area == null || d.area > max)) return false;
                }
                if (f.priceMin !== "" && f.priceMin != null) {
                    const min = parseFilterNumber(f.priceMin);
                    if (min != null && (d.deal_price == null || d.deal_price < min)) return false;
                }
                if (f.priceMax !== "" && f.priceMax != null) {
                    const max = parseFilterNumber(f.priceMax);
                    if (max != null && (d.deal_price == null || d.deal_price > max)) return false;
                }
                return true;
            });
        }

        // ponytail: client-side sort of already-filtered rows; nulls last
        function sortValue(d, col) {
            if (col.key === "periodShortLabel") {
                const m = String(periodDisplay(d)).match(/^(\d)\s+кв\s+(\d{4})$/);
                return m ? Number(m[2]) * 10 + Number(m[1]) : null;
            }
            if (col.format === "purpose") return objectKindLabel(d) || "";
            if (
                col.format === "money" ||
                col.format === "moneyMuted" ||
                col.format === "area" ||
                col.format === "year" ||
                col.format === "number"
            ) {
                const n = Number(d[col.key]);
                return Number.isFinite(n) ? n : null;
            }
            if (col.format === "date") {
                const m = String(d[col.key] || "").match(/^(\d{4})-(\d{2})-(\d{2})/);
                return m ? Number(m[1] + m[2] + m[3]) : null;
            }
            const v = d[col.key];
            return v == null || v === "" ? "" : String(v);
        }

        function compareSortValues(a, b, col) {
            const va = sortValue(a, col);
            const vb = sortValue(b, col);
            const aEmpty = va == null || va === "";
            const bEmpty = vb == null || vb === "";
            if (aEmpty && bEmpty) return 0;
            if (aEmpty) return 1;
            if (bEmpty) return -1;
            if (typeof va === "number" && typeof vb === "number") return va - vb;
            return String(va).localeCompare(String(vb), "ru", { numeric: true, sensitivity: "base" });
        }

        function applySort(deals) {
            const key = searchState.sort?.key;
            if (!key) return deals;
            const col = TABLE_COLUMNS.find((c) => c.key === key);
            if (!col) return deals;
            const mult = searchState.sort.dir === "desc" ? -1 : 1;
            return [...deals].sort((a, b) => mult * compareSortValues(a, b, col));
        }

        function renderCategoryCard(cat) {
            if (!cat?.count) return "";
            return `<div class="col-md-6 col-xl-4">
                <div class="border rounded-3 p-3 h-100 bg-light">
                    <div class="fw-semibold mb-2">${escapeHtml(cat.label)}</div>
                    <div class="small text-muted mb-1">Записей: <strong class="text-dark">${cat.count}</strong></div>
                    <div class="small text-muted mb-1">Средняя сумма: <strong class="text-dark">${formatMoney(cat.priceAvg)}</strong></div>
                    <div class="small text-muted mb-1">Средняя ₽/м²: <strong class="text-dark">${formatMoney(cat.pricePerSqmAvg)}</strong></div>
                    <div class="small text-muted">Мин. / макс.: ${formatMoney(cat.priceMin)} / ${formatMoney(cat.priceMax)}</div>
                </div>
            </div>`;
        }

        function renderStats(stats, filteredCount, totalCount) {
            const categories = Object.values(stats.byCategory || {}).filter((c) => c.count > 0);
            const categoryHtml = categories.length
                ? `<div class="row g-3 mb-3">${categories.map(renderCategoryCard).join("")}</div>`
                : `<p class="text-muted small mb-3">Нет данных по категориям.</p>`;

            const filterNote =
                filteredCount < totalCount
                    ? `<p class="small text-muted mb-0 mt-2">В сводке: ${filteredCount} из ${totalCount} записей (с учётом фильтров).</p>`
                    : "";

            return `<section class="card-panel p-4 mb-4" id="statsBlock">
                <h2 class="h5 mb-3">Сводка по кварталу</h2>
                <div class="row g-3 mb-4">
                    <div class="col-6 col-md-3">
                        <div class="info-label">Записей</div>
                        <div class="stat-value">${stats.total}</div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="info-label">Средняя сумма</div>
                        <div class="stat-value">${formatMoney(stats.priceAvg)}</div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="info-label">Средняя ₽/м²</div>
                        <div class="stat-value">${formatMoney(stats.pricePerSqmAvg)}</div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="info-label">Мин. / макс.</div>
                        <div class="fw-semibold">${formatMoney(stats.priceMin)} / ${formatMoney(stats.priceMax)}</div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="info-label">Сумма</div>
                        <div class="fw-semibold">${formatMoney(stats.priceSum)}</div>
                    </div>
                </div>
                <div class="info-label mb-2">По типам объектов</div>
                ${categoryHtml}
                ${filterNote}
            </section>`;
        }

        function selectFilter(id, options, current, allLabel) {
            const opts = [`<option value="">${escapeHtml(allLabel)}</option>`]
                .concat(options.map((o) => `<option value="${escapeHtml(o)}"${current === o ? " selected" : ""}>${escapeHtml(o)}</option>`))
                .join("");
            return `<select class="form-select form-select-sm" data-filter="${id}" aria-label="Фильтр">${opts}</select>`;
        }

        function inputFilter(id, placeholder, current) {
            return `<input type="text" class="form-control form-control-sm" data-filter="${id}" placeholder="${escapeHtml(placeholder)}" value="${escapeHtml(current || "")}" aria-label="Фильтр">`;
        }

        function uniquePurposeLabels(deals) {
            return [...new Set(deals.map((d) => objectKindLabel(d)).filter(Boolean))].sort((a, b) =>
                String(a).localeCompare(String(b), "ru")
            );
        }

        function uniquePeriods(deals) {
            return [...new Set(deals.map((d) => periodDisplay(d)).filter((v) => v && v !== "—"))].sort((a, b) => {
                const parse = (s) => {
                    const m = String(s).match(/^(\d)\s+кв\s+(\d{4})$/);
                    return m ? Number(m[2]) * 10 + Number(m[1]) : 0;
                };
                return parse(b) - parse(a);
            });
        }

        function selectFilterOptions(id, options, current, allLabel) {
            const opts = [`<option value="">${escapeHtml(allLabel)}</option>`]
                .concat(
                    options.map((o) => {
                        const value = typeof o === "object" ? o.value : o;
                        const label = typeof o === "object" ? o.label : o;
                        return `<option value="${escapeHtml(value)}"${current === value ? " selected" : ""}>${escapeHtml(label)}</option>`;
                    })
                )
                .join("");
            return `<select class="form-select form-select-sm" data-filter="${id}" aria-label="Фильтр">${opts}</select>`;
        }

        function renderDealsTable(deals) {
            const all = searchState.allDeals;
            const f = searchState.filters;
            const colCount = TABLE_COLUMNS.length;

            const filterRow = `
                <tr class="filter-row">
                    <th>${selectFilter("period", uniquePeriods(all), f.period, "Все")}</th>
                    <th class="text-center align-middle">
                        <button type="button" class="btn btn-sm btn-outline-secondary" id="resetFiltersBtn" title="Сбросить фильтры">
                            <i class="fa-solid fa-rotate-left"></i>
                        </button>
                    </th>
                    <th>${selectFilter("city", uniqueValues(all, "city"), f.city, "Все")}</th>
                    <th>${inputFilter("street", "Улица…", f.street)}</th>
                    <th>
                        <div class="d-flex flex-column gap-1">
                            ${yearBuildInputFilter("yearBuildMin", "от", f.yearBuildMin)}
                            ${yearBuildInputFilter("yearBuildMax", "до", f.yearBuildMax)}
                        </div>
                    </th>
                    <th>${selectFilter("operationKind", uniqueValues(all, "operationKind"), f.operationKind, "Все")}</th>
                    <th>${selectFilter("objectType", uniqueValues(all, "realestateTypeLabel"), f.objectType, "Все")}</th>
                    <th>${selectFilter("purposeLabel", uniquePurposeLabels(all), f.purposeLabel, "Все")}</th>
                    <th>
                        <div class="d-flex flex-column gap-1">
                            ${numericInputFilter("areaMin", "от", f.areaMin)}
                            ${numericInputFilter("areaMax", "до", f.areaMax)}
                        </div>
                    </th>
                    <th>
                        <div class="d-flex flex-column gap-1">
                            ${numericInputFilter("priceMin", "₽ от", f.priceMin)}
                            ${numericInputFilter("priceMax", "₽ до", f.priceMax)}
                        </div>
                    </th>
                    <th></th>
                    <th>${selectFilter("docType", uniqueValues(all, "doc_type"), f.docType, "Все")}</th>
                </tr>`;

            const headerRow = TABLE_COLUMNS.map((col) => {
                const align = col.align === "end" ? " text-end" : "";
                const colClass = col.colClass ? ` ${col.colClass}` : "";
                const active = searchState.sort?.key === col.key;
                const sortClass = active
                    ? searchState.sort.dir === "desc"
                        ? " sort-desc"
                        : " sort-asc"
                    : "";
                const ind = active
                    ? searchState.sort.dir === "desc"
                        ? "▼"
                        : "▲"
                    : "▲";
                return `<th class="sortable${colClass}${align}${sortClass}" data-sort-key="${escapeHtml(col.key)}" title="Сортировка" role="columnheader" tabindex="0">${escapeHtml(col.title)}<span class="sort-ind" aria-hidden="true">${ind}</span></th>`;
            }).join("");

            const rows = deals.map((d) => {
                const cells = TABLE_COLUMNS.map((col) => {
                    const classes = [col.colClass || ""];
                    if (col.align === "end") {
                        if (col.format === "money") classes.push("text-money", "text-money--sum");
                        else if (col.format === "moneyMuted") classes.push("text-money", "text-money--muted");
                        else if (col.format === "area" || col.format === "year") classes.push("text-num");
                        else classes.push("text-end");
                    }
                    return `<td class="${classes.filter(Boolean).join(" ")}">${formatDealCell(d, col)}</td>`;
                }).join("");
                return `<tr>${cells}</tr>`;
            }).join("");

            const emptyRow = deals.length
                ? ""
                : `<tr><td colspan="${colCount}" class="text-muted text-center py-4">Нет записей по выбранным фильтрам</td></tr>`;

            return `<section class="card-panel p-4" id="tableBlock">
                <div class="export-bar mb-3">
                    <h2 class="h5 mb-0">Продажа и аренда <span class="text-muted fs-6 fw-normal">(${deals.length})</span></h2>
                    <div class="d-flex flex-wrap gap-2">
                        <button type="button" class="btn btn-sm btn-outline-success" id="exportExcelBtn">
                            <i class="fa-solid fa-file-excel me-1"></i>Excel
                        </button>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-sm table-hover deals-table mb-0" id="dealsTable">
                        <thead class="table-light">
                            <tr>${headerRow}</tr>
                            ${filterRow}
                        </thead>
                        <tbody>${rows}${emptyRow}</tbody>
                    </table>
                </div>
            </section>`;
        }

        function bindFilterHandlers() {
            document.querySelectorAll("[data-filter]").forEach((el) => {
                const id = el.dataset.filter;

                const commitFilter = () => {
                    let next = el.value;
                    if (YEAR_BUILD_FILTERS.has(id)) {
                        next = next.replace(/\D/g, "").slice(0, 4);
                        if (next !== el.value) el.value = next;
                    } else if (NUMERIC_FILTERS.has(id)) {
                        next = next.trim();
                    }
                    searchState.filters[id] = next;
                    refreshResultsView();
                };

                if (el.tagName === "SELECT") {
                    el.addEventListener("change", commitFilter);
                    return;
                }

                if (TEXT_INPUT_FILTERS.has(id)) {
                    let debounceTimer;
                    el.addEventListener("input", () => {
                        clearTimeout(debounceTimer);
                        debounceTimer = setTimeout(commitFilter, 450);
                    });
                    el.addEventListener("keydown", (e) => {
                        if (e.key === "Enter") {
                            e.preventDefault();
                            clearTimeout(debounceTimer);
                            commitFilter();
                        }
                    });
                    return;
                }

                if (NUMERIC_FILTERS.has(id) || YEAR_BUILD_FILTERS.has(id)) {
                    if (YEAR_BUILD_FILTERS.has(id)) {
                        el.addEventListener("input", () => {
                            const digits = el.value.replace(/\D/g, "").slice(0, 4);
                            if (digits !== el.value) el.value = digits;
                        });
                    }
                    el.addEventListener("keydown", (e) => {
                        if (e.key === "Enter") {
                            e.preventDefault();
                            commitFilter();
                        }
                    });
                    return;
                }

                el.addEventListener("change", commitFilter);
            });
            const resetBtn = document.getElementById("resetFiltersBtn");
            if (resetBtn) {
                resetBtn.addEventListener("click", () => {
                    searchState.filters = {};
                    refreshResultsView();
                });
            }
            document.getElementById("exportExcelBtn")?.addEventListener("click", exportExcel);
        }

        function bindSortHandlers() {
            document.querySelectorAll("#dealsTable th.sortable").forEach((th) => {
                const activate = () => {
                    const key = th.dataset.sortKey;
                    if (searchState.sort?.key === key) {
                        searchState.sort = {
                            key,
                            dir: searchState.sort.dir === "asc" ? "desc" : "asc"
                        };
                    } else {
                        searchState.sort = { key, dir: "asc" };
                    }
                    refreshResultsView();
                };
                th.addEventListener("click", activate);
                th.addEventListener("keydown", (e) => {
                    if (e.key === "Enter" || e.key === " ") {
                        e.preventDefault();
                        activate();
                    }
                });
            });
        }

        function getNextYearToLoad() {
            return YEAR_LOAD_ORDER.find(
                (y) => searchState.availableYears.includes(y) && !searchState.loadedYears.has(y)
            );
        }

        function renderYearActions() {
            const nextYear = getNextYearToLoad();
            if (!nextYear) return "";
            return `<div class="year-actions mb-3" id="yearActionsBlock">
                <button type="button" class="btn btn-outline-primary" id="loadYearBtn">
                    <i class="fa-solid fa-calendar-plus me-1" aria-hidden="true"></i>Анализировать ${nextYear} год
                </button>
                <span class="text-muted small">Добавит продажи и аренду за ${nextYear} год к текущей таблице</span>
            </div>`;
        }

        function renderResultsNote() {
            const loaded = [...searchState.loadedYears].sort((a, b) => b - a);
            let html = `<p class="text-muted mb-2">Кадастровый квартал: <strong>${escapeHtml(searchState.quarterCadNumber)}</strong></p>`;
            if (loaded.length) {
                html += `<p class="small text-muted mb-2">Проанализированы годы: <strong>${loaded.join(", ")}</strong></p>`;
            }
            const rentN = searchState.allDeals.filter((d) => d.operationKind === "Аренда").length;
            const dealN = searchState.allDeals.length - rentN;
            if (searchState.allDeals.length) {
                html += `<p class="small text-muted mb-2">В таблице: <strong>${dealN}</strong> продаж, <strong>${rentN}</strong> договоров аренды</p>`;
            } else if (searchState.loadedYears?.size) {
                html += `<p class="small text-muted mb-2">Продаж и аренды по выбранным фильтрам не найдено</p>`;
            }
            for (const msg of searchState.yearNotes) {
                html += `<div class="alert alert-info py-2 small mb-2">${escapeHtml(msg)}</div>`;
            }
            if (searchState.meta?.truncated) {
                html += `<div class="alert alert-warning py-2 small">Показаны первые ${searchState.meta.shown} из ${searchState.meta.totalInQuarter} записей за последний загруженный год.</div>`;
            }
            return html;
        }

        function renderResultsView() {
            const filtered = applySort(getFilteredDeals());
            const stats = buildClientStats(filtered);
            const results = document.getElementById("results");
            results.innerHTML =
                `<div id="resultsNote">${renderResultsNote()}</div>` +
                renderYearActions() +
                renderStats(stats, filtered.length, searchState.allDeals.length) +
                renderDealsTable(filtered);
            results.classList.remove("d-none");
            bindFilterHandlers();
            bindSortHandlers();
            bindLoadYearBtn();
        }

        function refreshResultsView() {
            renderResultsView();
        }

        async function requestDealsSearch(quarter, year, objectTypes, operationKinds) {
            const types = objectTypes ?? searchState.objectTypes ?? getSelectedObjectTypes();
            const ops = operationKinds ?? searchState.operationKinds ?? getSelectedOperationKinds();
            const res = await fetchWithRetry(`${API_BASE}/api/deals/search`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    quarterCadNumber: quarter,
                    limit: 10000,
                    year,
                    objectTypes: types,
                    operationKinds: ops
                })
            });
            const raw = await res.text();
            let data;
            try {
                data = raw ? JSON.parse(raw) : {};
            } catch {
                throw new Error("Сервер вернул неверный ответ");
            }
            if (!res.ok && res.status !== 202) throw new Error(data.error || `HTTP ${res.status}`);
            if ((data.async && data.jobId) || res.status === 202) {
                data = await pollDealsJob(data.jobId, year ?? data.year);
            }
            return data;
        }

        function bindLoadYearBtn() {
            const btn = document.getElementById("loadYearBtn");
            if (!btn) return;
            btn.addEventListener("click", () => loadNextYear());
        }

        async function loadNextYear() {
            const year = getNextYearToLoad();
            if (!year) return;
            const btn = document.getElementById("loadYearBtn");
            const alertBox = document.getElementById("alertBox");
            alertBox.innerHTML = "";
            if (btn) {
                btn.disabled = true;
                btn.innerHTML = `<span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>Загрузка ${year}…`;
            }
            showSearchLoading();
            document.getElementById("searchLoadingText").textContent = `Сканируем данные за ${year} год…`;
            try {
                const data = await requestDealsSearch(searchState.quarterCadNumber, year);
                searchState.loadedYears.add(year);
                if (data.deals?.length) {
                    searchState.allDeals = searchState.allDeals.concat(data.deals);
                }
                if (data.message && !data.found) {
                    searchState.yearNotes.push(data.message);
                }
                if (data.meta) searchState.meta = data.meta;
                renderResultsView();
            } catch (err) {
                const isNetwork =
                    err.name === "TypeError" ||
                    /load failed|failed to fetch|network/i.test(String(err.message));
                const msg = isNetwork
                    ? `Не удалось загрузить данные за ${year} год. Проверьте соединение и попробуйте снова.`
                    : err.message;
                alertBox.innerHTML = `<div class="alert alert-danger">${escapeHtml(msg)}</div>`;
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = `<i class="fa-solid fa-calendar-plus me-1" aria-hidden="true"></i>Анализировать ${year} год`;
                }
            } finally {
                hideSearchLoading();
            }
        }

        function dealsToRows(deals) {
            return deals.map((d) => {
                const row = {};
                for (const col of EXPORT_COLUMNS) {
                    row[col.title] = exportDealValue(d, col);
                }
                return row;
            });
        }

        function exportExcel() {
            if (typeof XLSX === "undefined") {
                alert("Библиотека Excel не загружена");
                return;
            }
            const deals = applySort(getFilteredDeals());
            if (!deals.length) {
                alert("Нет данных для экспорта");
                return;
            }
            const rows = dealsToRows(deals);
            const ws = XLSX.utils.json_to_sheet(rows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Продажа");
            const safeQuarter = searchState.quarterCadNumber.replace(/:/g, "-");
            XLSX.writeFile(wb, `sdelki_${safeQuarter}.xlsx`);
        }

        function initSearchResults(data, firstYear, objectTypes, operationKinds) {
            searchState = {
                quarterCadNumber: data.quarterCadNumber,
                allDeals: data.deals || [],
                availableYears: data.meta?.availableYears || [...YEAR_LOAD_ORDER],
                loadedYears: new Set([firstYear]),
                yearNotes: data.message && !data.found ? [data.message] : [],
                objectTypes: objectTypes || [],
                operationKinds: operationKinds || ["deal", "rent"],
                meta: data.meta || {},
                filters: {},
                sort: { key: null, dir: "asc" }
            };
            renderResultsView();
        }

        document.getElementById("searchForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const quarter = document.getElementById("quarterInput").value.trim();
            const alertBox = document.getElementById("alertBox");
            const results = document.getElementById("results");
            const btn = document.getElementById("searchBtn");

            alertBox.innerHTML = "";
            results.classList.add("d-none");
            const objectTypes = getSelectedObjectTypes();
            const operationKinds = getSelectedOperationKinds();
            if (!operationKinds.length) {
                alertBox.innerHTML =
                    '<div class="alert alert-warning">Отметьте хотя бы один вид: Продажа или Аренда.</div>';
                return;
            }
            if (!objectTypes.length) {
                alertBox.innerHTML =
                    '<div class="alert alert-warning">Отметьте хотя бы один тип объекта: ЗУ, Здание или Помещение.</div>';
                return;
            }
            btn.disabled = true;
            showSearchLoading();

            try {
                document.getElementById("searchLoadingText").textContent =
                    `Сканируем данные за ${DEFAULT_FIRST_YEAR} год…`;
                const data = await requestDealsSearch(quarter, DEFAULT_FIRST_YEAR, objectTypes, operationKinds);
                initSearchResults(data, DEFAULT_FIRST_YEAR, objectTypes, operationKinds);
            } catch (err) {
                const isNetwork =
                    err.name === "TypeError" ||
                    /load failed|failed to fetch|network/i.test(String(err.message));
                const onRender = /onrender\.com/i.test(API_BASE);
                const msg = isNetwork
                    ? onRender
                        ? "Сервер просыпается или связь прервана. Подождите 10–20 с и нажмите «Найти» снова — поиск займёт около минуты."
                        : `Не удалось связаться с сервером (${API_BASE}). Откройте http://localhost:8787/deals и убедитесь, что запущен npm start.`
                    : err.message;
                alertBox.innerHTML = `<div class="alert alert-danger">${escapeHtml(msg)}</div>`;
            } finally {
                hideSearchLoading();
                btn.disabled = false;
            }
        });

        const params = new URLSearchParams(location.search);
        if (params.get("quarter")) {
            document.getElementById("quarterInput").value = params.get("quarter");
        }
    </script>
<script src="/theme.js?v=2"></script>
</body>
</html>
