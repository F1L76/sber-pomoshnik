<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск информации по VIN — СберБизнес Помощник</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.cdnfonts.com/css/sb-sans-interface" rel="stylesheet">
    <style>
        :root {
            --sber-green: #21A038;
            --sber-bg: #F0F4F8;
            --sber-card: #FFFFFF;
            --sber-text: #1E2A3A;
            --sber-muted: #617188;
            --sber-border: #E2EAF2;
            --radius: 20px;
        }
        body {
            font-family: 'SB Sans Interface', system-ui, sans-serif;
            background: var(--sber-bg);
            color: var(--sber-text);
            min-height: 100vh;
        }
        .hero {
            background: linear-gradient(135deg, #1E2A3A 0%, #243447 100%);
            color: #fff;
            border-bottom: 3px solid var(--sber-green);
            padding: 2rem 0 2.5rem;
        }
        .card-panel {
            background: var(--sber-card);
            border: 1px solid var(--sber-border);
            border-radius: var(--radius);
            box-shadow: 0 4px 24px rgba(30, 42, 58, 0.06);
        }
        .btn-sber {
            background: var(--sber-green);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
        }
        .btn-sber:hover { background: #1B8A32; color: #fff; }
        .btn-outline-sber {
            border: 1px solid var(--sber-green);
            color: var(--sber-green);
            font-weight: 600;
            border-radius: 12px;
        }
        .btn-outline-sber:hover { background: rgba(33, 160, 56, 0.08); color: #1B8A32; }
        .search-input-group {
            display: flex;
            align-items: stretch;
            gap: 0.75rem;
        }
        .search-input-group .form-control { min-width: 0; flex: 1 1 auto; }
        .search-input-group .btn-search {
            white-space: nowrap;
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .vin-tabs .nav-link {
            color: var(--sber-muted);
            font-weight: 600;
            border-radius: 10px;
        }
        .vin-tabs .nav-link.active {
            background: rgba(33, 160, 56, 0.12);
            color: var(--sber-green);
        }
        .info-label {
            font-size: 0.8rem;
            color: var(--sber-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .stats-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .stat-chip {
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0.35rem 0.75rem;
            border-radius: 999px;
            background: #eef2f6;
            color: var(--sber-text);
        }
        .stat-chip.ok { background: rgba(33, 160, 56, 0.14); color: #156B28; }
        .stat-chip.bad { background: rgba(229, 57, 53, 0.12); color: #C62828; }
        .vin-card {
            border: 1px solid var(--sber-border);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 1rem;
            background: #fff;
        }
        .vin-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--sber-border);
        }
        .vin-card-header.valid { background: linear-gradient(90deg, rgba(33,160,56,0.08), transparent); }
        .vin-card-header.warn { background: linear-gradient(90deg, rgba(255,193,7,0.12), transparent); }
        .vin-card-header.invalid { background: linear-gradient(90deg, rgba(229,57,53,0.08), transparent); }
        .vin-code {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 0.95rem;
            color: var(--sber-muted);
        }
        .vin-title { font-size: 1.15rem; font-weight: 700; margin-top: 0.15rem; }
        .status-badge {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 0.3rem 0.6rem;
            border-radius: 8px;
            white-space: nowrap;
        }
        .status-badge.ok { background: var(--sber-green); color: #fff; }
        .status-badge.warn { background: #f0ad4e; color: #fff; }
        .status-badge.bad { background: #E53935; color: #fff; }
        .vin-card-body { padding: 1rem 1.25rem 1.25rem; }
        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 0.75rem 1.25rem;
        }
        .meta-item span {
            display: block;
            font-size: 0.78rem;
            color: var(--sber-muted);
            margin-bottom: 0.15rem;
        }
        .meta-item strong { font-weight: 600; }
        .section-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--sber-green);
            margin: 1rem 0 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .section-title:first-child { margin-top: 0; }
        .alert-correction {
            background: #fff8e6;
            border: 1px solid #f0d78c;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .empty-state {
            text-align: center;
            padding: 2.5rem 1rem;
            color: var(--sber-muted);
        }
        .empty-state i { font-size: 2.5rem; color: var(--sber-green); opacity: 0.7; margin-bottom: 1rem; }
        .search-loading {
            display: none;
            align-items: center;
            gap: 1.25rem;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff 0%, #f5faf7 100%);
            border: 1px solid var(--sber-border);
            border-radius: var(--radius);
            box-shadow: 0 4px 24px rgba(30, 42, 58, 0.06);
        }
        .search-loading.active { display: flex; }
        .loader-gif {
            width: 88px;
            height: 88px;
            flex-shrink: 0;
            border-radius: 14px;
            object-fit: contain;
            background: #fff;
        }
        .search-loading-body {
            flex: 1;
            min-width: 0;
        }
        .search-loading-title {
            font-weight: 600;
            font-size: 1rem;
            color: var(--sber-text);
            margin: 0 0 0.25rem;
        }
        .search-loading-text {
            color: var(--sber-muted);
            font-size: 0.9rem;
            margin: 0 0 0.65rem;
        }
        .loader-progress {
            height: 4px;
            background: var(--sber-border);
            border-radius: 4px;
            overflow: hidden;
        }
        .loader-progress-bar {
            height: 100%;
            width: 35%;
            background: linear-gradient(90deg, var(--sber-green), #3dd15a);
            border-radius: 4px;
            animation: loader-slide 1.4s ease-in-out infinite;
        }
        @keyframes loader-slide {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(320%); }
        }
    </style>
</head>
<body>
    <header class="hero">
        <div class="container">
            <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
                <div>
                    <p class="small mb-1 opacity-75">СберБизнес Помощник · сопровождение 2.0</p>
                    <h1 class="h3 mb-0"><i class="fa-solid fa-car me-2 text-success"></i>Поиск информации по VIN номеру</h1>
                </div>
                <a href="/?view=services" class="btn btn-outline-light btn-sm">← СберБизнес Помощник</a>
            </div>
        </div>
    </header>

    <main class="container py-4">
        <section class="card-panel p-4 mb-4">
            <ul class="nav nav-pills vin-tabs mb-3" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="tabSingle" type="button" data-tab="single">Один VIN</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="tabBatch" type="button" data-tab="batch">Групповой</button>
                </li>
            </ul>

            <div id="panelSingle">
                <label for="vinSingle" class="form-label fw-semibold">VIN номер</label>
                <div class="search-input-group">
                    <input type="text" class="form-control form-control-lg text-uppercase" id="vinSingle"
                           maxlength="32" placeholder="WMA58WZZ8JM786405" autocomplete="off" spellcheck="false">
                    <button type="button" class="btn btn-sber btn-lg btn-search" id="searchBtn">
                        <i class="fa-solid fa-magnifying-glass me-2"></i>Найти
                    </button>
                </div>
                <div class="form-text mt-2">17 символов (без I, O, Q). Источник: vin.drom.ru</div>
            </div>

            <div id="panelBatch" class="d-none">
                <label for="vinBatch" class="form-label fw-semibold">Список VIN (до 50)</label>
                <textarea class="form-control mb-2" id="vinBatch" rows="8"
                          placeholder="По одному VIN на строку" spellcheck="false"></textarea>
                <div class="d-flex flex-wrap gap-2">
                    <label class="btn btn-outline-sber btn-sm mb-0">
                        <i class="fa-solid fa-file-arrow-up me-1"></i>Загрузить .txt
                        <input type="file" id="vinFile" accept=".txt,.csv,text/plain" hidden>
                    </label>
                    <button type="button" class="btn btn-sber btn-sm" id="searchBtnBatch">
                        <i class="fa-solid fa-magnifying-glass me-1"></i>Найти
                    </button>
                </div>
            </div>

            <div class="mt-3">
                <button type="button" class="btn btn-outline-sber btn-sm" id="btnDemo">Подставить пример</button>
                <button type="button" class="btn btn-link btn-sm text-muted" id="btnClear">Очистить</button>
            </div>
        </section>

        <div id="searchLoading" class="search-loading" aria-live="polite" aria-busy="false">
            <img
                class="loader-gif"
                id="searchLoaderGif"
                src="/assets/loading-sbercat.gif"
                width="88"
                height="88"
                alt="Сберкот ищет VIN"
                onerror="this.onerror=null;this.src='https://gifs.obs.ru-moscow-1.hc.sbercloud.ru/f61fbd71aa1b7d2456a24782a6af8553657c341a6d7e02d28f23205097d4b44b.gif'"
            >
            <div class="search-loading-body">
                <p class="search-loading-title" id="loadingTitle">Ищем данные по VIN…</p>
                <p class="search-loading-text mb-0" id="searchLoadingText">Запрос к vin.drom.ru…</p>
                <div class="loader-progress" aria-hidden="true">
                    <div class="loader-progress-bar"></div>
                </div>
            </div>
        </div>

        <div id="alertBox"></div>

        <section class="card-panel p-4" id="resultsPanel">
            <div id="statsRow" class="stats-row d-none"></div>
            <div id="results"></div>
            <div id="emptyState" class="empty-state">
                <div><i class="fa-solid fa-car-side"></i></div>
                <p class="mb-1 fw-semibold">Введите VIN и нажмите «Найти»</p>
                <p class="small mb-0">Марка, модель, год, двигатель, КПП и другие характеристики</p>
            </div>
        </section>
    </main>

    <script>
        const DEMO_VIN = "WMA58WZZ8JM786405";
        const MAX_VINS = 50;
        const API_BASE = location.protocol === "file:" ? "http://localhost:8787" : "";

        let activeTab = "single";

        const vinSingle = document.getElementById("vinSingle");
        const vinBatch = document.getElementById("vinBatch");
        const vinFile = document.getElementById("vinFile");
        const resultsEl = document.getElementById("results");
        const emptyState = document.getElementById("emptyState");
        const statsRow = document.getElementById("statsRow");
        const searchLoading = document.getElementById("searchLoading");
        const alertBox = document.getElementById("alertBox");

        const LOADING_MESSAGES = [
            "Запрос к vin.drom.ru…",
            "Проверяем VIN и нормализуем номер…",
            "Получаем марку, модель и год…",
            "Собираем характеристики ТС…",
            "Формируем карточку результата…"
        ];
        let loadingMessageTimer = null;
        let loadingMessageIndex = 0;

        function showSearchLoading(vinCount) {
            const title = document.getElementById("loadingTitle");
            const text = document.getElementById("searchLoadingText");
            title.textContent = vinCount > 1 ? `Ищем ${vinCount} VIN…` : "Ищем данные по VIN…";
            loadingMessageIndex = 0;
            text.textContent = LOADING_MESSAGES[0];
            searchLoading.classList.add("active");
            searchLoading.setAttribute("aria-busy", "true");
            clearInterval(loadingMessageTimer);
            loadingMessageTimer = setInterval(() => {
                loadingMessageIndex = (loadingMessageIndex + 1) % LOADING_MESSAGES.length;
                text.textContent = LOADING_MESSAGES[loadingMessageIndex];
            }, 2200);
        }

        function hideSearchLoading() {
            searchLoading.classList.remove("active");
            searchLoading.setAttribute("aria-busy", "false");
            clearInterval(loadingMessageTimer);
            loadingMessageTimer = null;
        }

        if (location.protocol === "file:") {
            alertBox.innerHTML = '<div class="alert alert-warning">Откройте через сервер: <a href="http://localhost:8787/vin">http://localhost:8787/vin</a></div>';
        }

        document.querySelectorAll("[data-tab]").forEach((btn) => {
            btn.addEventListener("click", () => {
                activeTab = btn.dataset.tab;
                document.querySelectorAll("[data-tab]").forEach((b) => b.classList.toggle("active", b === btn));
                document.getElementById("panelSingle").classList.toggle("d-none", activeTab !== "single");
                document.getElementById("panelBatch").classList.toggle("d-none", activeTab !== "batch");
            });
        });

        document.getElementById("searchBtn").addEventListener("click", runLookup);
        document.getElementById("searchBtnBatch").addEventListener("click", runLookup);
        document.getElementById("btnDemo").addEventListener("click", () => {
            document.getElementById("tabSingle").click();
            vinSingle.value = DEMO_VIN;
            vinSingle.focus();
        });
        document.getElementById("btnClear").addEventListener("click", clearAll);
        vinSingle.addEventListener("keydown", (e) => { if (e.key === "Enter") runLookup(); });
        vinFile.addEventListener("change", async (e) => {
            const file = e.target.files?.[0];
            if (!file) return;
            vinBatch.value = await file.text();
            document.getElementById("tabBatch").click();
        });

        function clearAll() {
            vinSingle.value = "";
            vinBatch.value = "";
            vinFile.value = "";
            statsRow.classList.add("d-none");
            statsRow.innerHTML = "";
            resultsEl.innerHTML = "";
            emptyState.classList.remove("d-none");
            alertBox.innerHTML = "";
        }

        function escapeHtml(s) {
            return String(s ?? "").replace(/[&<>"']/g, (c) => ({
                "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
            })[c]);
        }

        function row(label, value) {
            if (!value) return "";
            return `<div class="meta-item"><span>${escapeHtml(label)}</span><strong>${escapeHtml(value)}</strong></div>`;
        }

        function section(title, rowsHtml) {
            if (!rowsHtml.trim()) return "";
            return `<div class="section-title">${escapeHtml(title)}</div><div class="meta-grid">${rowsHtml}</div>`;
        }

        function renderCard(item) {
            const ok = item.found && !item.lookup_error;
            const eng = item.engine || {};
            const tr = item.transmission || {};
            const plant = item.plant || {};
            const engineStr = [eng.cylinders && `${eng.cylinders} цил.`, eng.displacement_l && `${eng.displacement_l} л`, eng.model, eng.configuration].filter(Boolean).join(" · ");
            const plantStr = [plant.city, plant.state, plant.country].filter(Boolean).join(", ");
            const transStr = [tr.style, tr.speeds && `${tr.speeds} ст.`].filter(Boolean).join(" · ");
            const headerClass = ok ? "valid" : item.vin_correction_message ? "warn" : "invalid";
            const badgeClass = ok ? "ok" : item.vin_correction_message ? "warn" : "bad";
            const badgeText = ok ? "Найден" : item.vin_correction_message ? "Возможна опечатка" : "Нет данных";

            const correction = item.vin_correction_message
                ? `<div class="alert-correction">${escapeHtml(item.vin_correction_message)}</div>` : "";
            const error = item.lookup_error && !item.vin_correction_message
                ? `<div class="alert alert-danger py-2 small">${escapeHtml(item.lookup_error)}</div>`
                : !ok && !item.vin_correction_message
                    ? `<div class="alert alert-secondary py-2 small">По этому VIN данных не найдено</div>` : "";

            return `<article class="vin-card">
                <div class="vin-card-header ${headerClass}">
                    <div>
                        <div class="vin-code">${escapeHtml(item.vin)}</div>
                        <div class="vin-title">${escapeHtml(item.title || "—")}</div>
                    </div>
                    <span class="status-badge ${badgeClass}">${badgeText}</span>
                </div>
                <div class="vin-card-body">
                    ${correction}${error}
                    ${section("Основное", [row("Марка", item.make), row("Модель", item.model), row("Год", item.model_year), row("Производитель", item.manufacturer), row("Комплектация", item.trim)].join(""))}
                    ${section("Кузов", [row("Класс кузова", item.body_class), row("Тип ТС", item.vehicle_type), row("Мощность", item.power_hp && `${item.power_hp} л.с.`), row("Цвет", item.color), row("Привод", item.drive_type)].join(""))}
                    ${section("Техника", [row("Топливо", item.fuel_type), row("Двигатель", engineStr), row("КПП", transStr)].join(""))}
                    ${section("Производство", row("Завод", plantStr))}
                </div>
            </article>`;
        }

        function estimateVinCount(payload) {
            if (payload.vins?.length) return Math.min(payload.vins.length, MAX_VINS);
            const found = String(payload.text || "").toUpperCase().match(/[A-HJ-NPR-Z0-9]{17}/g);
            if (found?.length) return Math.min(found.length, MAX_VINS);
            return Math.min(String(payload.text || "").split(/\r?\n/).map((l) => l.trim()).filter(Boolean).length || 1, MAX_VINS);
        }

        async function runLookup() {
            const payload = activeTab === "single"
                ? { vins: [vinSingle.value.trim()].filter(Boolean) }
                : { text: vinBatch.value };

            if (activeTab === "single" && !payload.vins?.length) { vinSingle.focus(); return; }
            if (activeTab === "batch" && !payload.text?.trim()) { vinBatch.focus(); return; }

            const vinCount = estimateVinCount(payload);
            const timeoutMs = vinCount <= 1 ? 120000 : Math.min(900000, 30000 + vinCount * 15000);
            const timeoutSec = Math.round(timeoutMs / 1000);

            alertBox.innerHTML = "";
            showSearchLoading(vinCount);

            const ctrl = new AbortController();
            const timer = setTimeout(() => ctrl.abort(), timeoutMs);

            try {
                const res = await fetch(`${API_BASE}/api/vin/lookup`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload),
                    signal: ctrl.signal
                });
                clearTimeout(timer);
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

                emptyState.classList.add("d-none");
                statsRow.classList.remove("d-none");
                statsRow.innerHTML = `
                    <span class="stat-chip">Всего: ${data.total}</span>
                    <span class="stat-chip ok">Найдено: ${data.found_count}</span>
                    <span class="stat-chip bad">Без данных: ${data.not_found_count}</span>`;
                resultsEl.innerHTML = data.results.map(renderCard).join("");
            } catch (err) {
                clearTimeout(timer);
                const msg = err.name === "AbortError"
                    ? `Превышено время ожидания (${timeoutSec} с). Разбейте список или повторите позже.`
                    : (err.message || "Ошибка запроса");
                alertBox.innerHTML = `<div class="alert alert-danger">${escapeHtml(msg)}</div>`;
            } finally {
                hideSearchLoading();
            }
        }
    </script>
</body>
</html>
