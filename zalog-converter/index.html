<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Конвертер Заключения</title>
  <script>(function(){try{if(localStorage.getItem("sber-pomoshnik:theme")==="dark")document.documentElement.setAttribute("data-theme","dark");}catch(e){}})();</script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" />
  <link href="https://fonts.cdnfonts.com/css/sb-sans-interface" rel="stylesheet" />
  <link rel="stylesheet" href="/zalog/styles.css?v=3" />
  <link rel="stylesheet" href="/theme.css?v=7" />
</head>
<body>
  <nav id="siteNav" class="navbar sber-nav sticky-top py-2 py-md-3">
    <div class="container-fluid px-3 px-md-4 d-flex flex-wrap align-items-center justify-content-between gap-2">
      <span class="navbar-brand-custom mb-0">
        <svg class="sber-logo" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="20" cy="20" r="18" fill="#21A038" stroke="white" stroke-width="1.5" />
          <path d="M12 20L18 26L28 14" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span>Конвертер Заключения</span>
      </span>
      <div class="theme-toggle-standalone">
        <div class="form-check form-switch theme-toggle-wrap mb-0" title="Светлая или тёмная тема">
          <input class="form-check-input" type="checkbox" role="switch" id="themeToggle" data-theme-toggle>
          <label class="form-check-label" for="themeToggle">
            <i class="fas fa-moon theme-toggle-icon" data-theme-icon aria-hidden="true"></i>
            <span data-theme-label>Светлая</span>
          </label>
        </div>
      </div>
    </div>
  </nav>

  <main class="app-main container px-3">
    <div id="appLayout" class="layout">
      <div class="upload-clip" id="uploadClip">
      <div class="upload-panel-shell" id="uploadPanelShell">
      <aside class="inn-card upload-panel" id="uploadPanel">
        <div class="upload-area">
          <h2 class="panel-title"><i class="fas fa-cloud-arrow-up me-2 text-success" aria-hidden="true"></i>Загрузить заключение и перечень залога</h2>
          <p class="hint mb-3">Нужны оба файла: PDF — заключение; XLSX — перечень объектов.</p>

          <div id="serverStatus" class="mb-3" role="status"></div>

          <label class="form-label small fw-semibold mb-1" for="pdfUpload">Файл заключения (PDF)</label>
          <input id="pdfUpload" class="form-control form-control-sm mb-3" type="file" accept=".pdf,application/pdf" />

          <label class="form-label small fw-semibold mb-1" for="xlsxUpload">Файл перечня залога (XLSX)</label>
          <input id="xlsxUpload" class="form-control form-control-sm mb-2" type="file" accept=".xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" />

          <div class="actions">
            <button type="button" class="btn btn-primary" id="btnConvert">
              <i class="fas fa-wand-magic-sparkles me-1" aria-hidden="true"></i>Преобразовать заключение
            </button>
            <button type="button" class="btn btn-outline-sber btn-sm" id="btnClear">Очистить</button>
          </div>
        </div>
      </aside>
      </div>
      </div>

      <section class="results" id="resultsSection">
        <div id="status" class="status" hidden></div>
        <div class="results-toolbar" id="resultsToolbar" hidden>
          <span id="resultsMeta" class="results-meta"></span>
          <div class="results-actions">
            <button type="button" class="btn btn-outline-sber btn-sm" id="btnRevealUpload" hidden>
              <i class="fas fa-folder-open me-1" aria-hidden="true"></i>Изменить файлы
            </button>
            <button type="button" class="btn btn-outline-sber btn-sm" id="btnDownload">
              <i class="fas fa-file-pdf me-1" aria-hidden="true"></i>Скачать PDF
            </button>
            <button type="button" class="btn btn-outline-sber btn-sm" id="btnPrint">
              <i class="fas fa-print me-1" aria-hidden="true"></i>Печать
            </button>
          </div>
        </div>
        <div class="empty-state" id="emptyState">
          <div class="empty-icon"><i class="fas fa-file-lines" aria-hidden="true"></i></div>
          <p class="mb-1 fw-semibold text-dark">Сводный отчёт появится здесь</p>
          <p class="hint mb-0">Загрузите PDF и XLSX, затем нажмите «Преобразовать заключение».</p>
        </div>
        <iframe id="reportFrame" class="report-frame" title="Сводный отчёт" scrolling="no" hidden></iframe>
      </section>
    </div>
  </main>

  <script src="/theme.js?v=1"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous"></script>
  <script src="/zalog-api-client.js?v=10"></script>
  <script src="/converter-status-ui.js?v=10"></script>
  <script src="/zalog-pdf-export.js?v=4"></script>
  <script src="/zalog/app.js?v=9"></script>
</body>
</html>
