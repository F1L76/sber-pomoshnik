<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск информации по кадастровому номеру — СберБизнес Помощник</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.cdnfonts.com/css/sb-sans-interface" rel="stylesheet">
    <style>
        :root {
            --sber-green: #21A038;
            --sber-blue: #0098F8;
            --sber-bg: #F0F4F8;
            --sber-card: #FFFFFF;
            --sber-text: #1E2A3A;
            --sber-muted: #617188;
            --sber-border: #E2EAF2;
            --radius: 20px;
        }
        body {
            font-family: 'SB Sans Interface', system-ui, sans-serif;
            background: var(--sber-bg);
            color: var(--sber-text);
            min-height: 100vh;
        }
        .hero {
            background: linear-gradient(135deg, #1E2A3A 0%, #243447 100%);
            color: #fff;
            border-bottom: 3px solid var(--sber-green);
            padding: 2rem 0 2.5rem;
        }
        .card-panel {
            background: var(--sber-card);
            border: 1px solid var(--sber-border);
            border-radius: var(--radius);
            box-shadow: 0 4px 24px rgba(30, 42, 58, 0.06);
        }
        .btn-sber {
            background: var(--sber-green);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
        }
        .btn-sber:hover { background: #1B8A32; color: #fff; }
        .source-badge {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 0.25rem 0.55rem;
            border-radius: 8px;
        }
        .source-bazacoop { background: #1a5f4a; color: #fff; }
        .source-2gis { background: #19aa1e; color: #fff; }
        .source-yandex { background: #fc3f1d; color: #fff; }
        .verify-ok { color: var(--sber-green); font-weight: 600; }
        .verify-warn { color: #c47a00; font-weight: 600; }
        .verify-bad { color: #c0392b; font-weight: 600; }
        .compare-row.match { background: #f0faf3; }
        .compare-row.mismatch { background: #fff8f0; }
        .listing-card { overflow: hidden; }
        .photo-strip {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding-bottom: 0.25rem;
        }
        .photo-strip img {
            width: 120px;
            height: 90px;
            object-fit: cover;
            border-radius: 10px;
            flex-shrink: 0;
            border: 1px solid var(--sber-border);
        }
        .info-label {
            font-size: 0.8rem;
            color: var(--sber-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .price-tag {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--sber-green);
        }
        .relevance {
            font-size: 0.85rem;
            color: var(--sber-muted);
        }
        .search-status {
            display: none;
            align-items: center;
            gap: 1.1rem;
            padding: 1rem 1.25rem;
            background: linear-gradient(135deg, #fff 0%, #f5faf7 100%);
            border: 1px solid var(--sber-border);
            border-radius: 16px;
            margin-bottom: 1rem;
            color: var(--sber-text);
            font-size: 0.95rem;
            font-weight: 500;
        }
        .search-status.active { display: flex; }
        .search-status-body {
            flex: 1;
            min-width: 0;
        }
        .search-status-phrase {
            margin: 0 0 0.35rem;
            font-size: 1rem;
            font-weight: 600;
            color: var(--sber-text);
            line-height: 1.35;
        }
        .search-status-sources {
            color: var(--sber-muted);
            font-size: 0.85rem;
            font-weight: 500;
        }
        .search-status-cat {
            flex-shrink: 0;
            width: 112px;
            height: 112px;
            object-fit: contain;
            border-radius: 14px;
            background: #fff;
            animation: search-cat-bob 1.8s ease-in-out infinite;
        }
        @keyframes search-cat-bob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
        @media (prefers-reduced-motion: reduce) {
            .search-status-cat { animation: none; }
        }
        .source-pending {
            opacity: 0.55;
            font-size: 0.85rem;
        }
        .source-done { color: var(--sber-green); font-weight: 600; }
        .panorama-block {
            margin-top: 1.5rem;
            padding-top: 1.25rem;
            border-top: 1px solid var(--sber-border);
        }
        .panorama-photo {
            width: 100%;
            height: auto;
            border-radius: 14px;
            border: 1px solid var(--sber-border);
            display: block;
            aspect-ratio: 4 / 3;
            object-fit: cover;
        }
        .panorama-duo {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1rem;
        }
        @media (max-width: 768px) {
            .panorama-duo { grid-template-columns: 1fr; }
        }
        .panorama-card {
            border: 1px solid var(--sber-border);
            border-radius: 14px;
            padding: 0.75rem;
            background: #fafcfb;
        }
        .panorama-card-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .boundary-map {
            max-width: 100%;
            border-radius: 14px;
            border: 1px solid var(--sber-border);
            overflow: hidden;
            background: #f4f8f4;
        }
        .boundary-map svg {
            display: block;
            width: 100%;
            height: auto;
        }
        .related-kn-list {
            margin: 0;
            padding-left: 1.1rem;
        }
        .search-input-group {
            display: flex;
            align-items: stretch;
            gap: 0.75rem;
        }
        .search-input-group .form-control {
            min-width: 0;
            flex: 1 1 auto;
        }
        .search-input-group .btn-search {
            white-space: nowrap;
            align-self: stretch;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            padding-left: 1.35rem;
            padding-right: 1.35rem;
        }
        @media (max-width: 576px) {
            .search-input-group { flex-direction: column; }
            .search-input-group .btn-search { width: 100%; }
        }
        .boundary-leaflet {
            height: 320px;
            border-radius: 14px;
            border: 1px solid var(--sber-border);
            background: #eef3ee;
            z-index: 0;
        }
        .boundary-map-hint { font-size: 0.8rem; }
        .boundary-fallback {
            color: var(--sber-muted);
            font-size: 0.85rem;
        }
        .panorama-fallback img {
            width: 100%;
            max-width: 650px;
            height: auto;
            border-radius: 14px;
            border: 1px solid var(--sber-border);
        }
    </style>
</head>
<body>
    <header class="hero">
        <div class="container">
            <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
                <div>
                    <p class="small mb-1 opacity-75">СберБизнес Помощник · сопровождение 2.0</p>
                    <h1 class="h3 mb-1"><i class="fa-solid fa-map-location-dot me-2 text-success"></i>Поиск информации по кадастровому номеру</h1>
                </div>
                <a href="/" class="btn btn-outline-light btn-sm">← СберБизнес Помощник</a>
            </div>
        </div>
    </header>

    <main class="container py-4">
        <section class="card-panel p-4 mb-4">
            <form id="searchForm">
                <label for="cadastralInput" class="form-label fw-semibold">Кадастровый номер</label>
                <div class="search-input-group">
                    <input type="text" class="form-control form-control-lg" id="cadastralInput"
                           placeholder="77:05:0001005:19" required pattern="[\d:]+">
                    <button type="submit" class="btn btn-sber btn-lg btn-search" id="searchBtn">
                        <i class="fa-solid fa-magnifying-glass me-2"></i>Найти
                    </button>
                </div>
                <div class="form-text mt-2">Формат: XX:XX:XXXXXXX:XXXX</div>
            </form>
        </section>

        <div id="alertBox"></div>
        <div id="searchStatus" class="search-status" role="status" aria-live="polite">
            <img
                class="search-status-cat"
                src="/assets/loading-dancing-cat.gif"
                width="112"
                height="112"
                alt="Идёт поиск"
                decoding="async"
                onerror="this.onerror=null;this.src='https://media1.tenor.com/m/2YJ8ecS0GBkAAAAC/cat-cats.gif'"
            >
            <div class="search-status-body">
                <p id="searchStatusPhrase" class="search-status-phrase">Ищем объект по кадастровому номеру…</p>
                <div id="searchStatusText" class="search-status-sources">Подключаемся к источникам…</div>
            </div>
        </div>
        <div id="results" class="d-none">
            <section class="card-panel p-4 mb-4" id="rosreestrBlock"></section>
            <section class="card-panel p-4 mb-4 d-none" id="panoramaBlock"></section>
            <section class="mb-3 d-flex flex-wrap gap-2" id="linksBlock"></section>
            <section id="listingsBlock"></section>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        const API_BASE = (() => {
            try {
                if (location.protocol === "http:" || location.protocol === "https:") return location.origin;
            } catch (_) { /* ignore */ }
            return "http://localhost:8787";
        })();

        const form = document.getElementById("searchForm");
        const searchStatus = document.getElementById("searchStatus");
        const searchStatusPhrase = document.getElementById("searchStatusPhrase");
        const searchStatusText = document.getElementById("searchStatusText");
        const results = document.getElementById("results");
        const alertBox = document.getElementById("alertBox");

        const LISTING_SOURCES = new Set(["bazacoop"]);
        const SOURCE_LABELS = { bazacoop: "БазаЦООП" };
        const SOURCE_PROGRESS = { rosreestr: "Росреестр", panorama: "2ГИС и Яндекс", bazacoop: "БазаЦООП" };
        const SEARCH_PHRASES = {
            start: [
                "Котик уже на разведке — открываем кадастровый номер",
                "Стартуем поиск: сначала база Росреестра, потом рынок",
                "Запоминаем номер и собираем всё, что о нём известно"
            ],
            rosreestr: [
                "Спрашиваем НСПД, что за объект скрывается за этим номером",
                "Читаем карточку Росреестра: адрес, площадь, стоимость",
                "Сверяем границы и характеристики в публичной карте"
            ],
            enrich: [
                "Ищем фото: 2ГИС и панорамы Яндекс Карт",
                "Смотрим, как объект выглядит с улицы",
                "Подбираем снимки местности по координатам"
            ],
            listings: [
                "Ищем объявления в БазаЦООП",
                "Подбираем аналоги по кадастру и региону",
                "Собираем рыночный контекст вокруг этого адреса"
            ],
            waiting: [
                "Ещё чуть-чуть — источники отвечают не одновременно",
                "Котик танцует, пока данные доезжают",
                "Почти собрали полную картину по объекту"
            ]
        };
        let progressState = {};
        let phraseTimer = null;
        let phraseCounters = {};

        function showAlert(type, message) {
            alertBox.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
        }

        if (location.protocol === "file:") {
            showAlert("warning", "Откройте страницу через сервер: <a href=\"http://localhost:8787/cadastral\">http://localhost:8787/cadastral</a> (запустите <code>node gigachat-proxy.mjs</code> в папке проекта).");
        }

        function escapeHtml(s) {
            return String(s ?? "").replace(/[&<>"']/g, (c) => ({
                "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
            })[c]);
        }

        function pickSearchPhrase(phase) {
            const list = SEARCH_PHRASES[phase] || SEARCH_PHRASES.waiting;
            const i = (phraseCounters[phase] || 0) % list.length;
            phraseCounters[phase] = i + 1;
            return list[i];
        }

        function currentSearchPhase() {
            if (!progressState.rosreestr) return "start";
            if (progressState.panorama !== "done") return "enrich";
            if (progressState.bazacoop === "pending") {
                return "listings";
            }
            return "waiting";
        }

        function resolveMediaUrl(url) {
            if (!url) return null;
            if (url.startsWith("/")) return API_BASE + url;
            if (url.startsWith("//")) return `${location.protocol}${url}`;
            return url;
        }

        function setSearchPhrase(phase) {
            if (!searchStatusPhrase) return;
            searchStatusPhrase.textContent = pickSearchPhrase(phase || currentSearchPhase());
        }

        function startPhraseRotation() {
            stopPhraseRotation();
            phraseCounters = {};
            setSearchPhrase("start");
            phraseTimer = setInterval(() => setSearchPhrase(currentSearchPhase()), 3200);
        }

        function stopPhraseRotation() {
            if (phraseTimer) {
                clearInterval(phraseTimer);
                phraseTimer = null;
            }
        }

        let boundaryMapInstance = null;

        function destroyBoundaryMap() {
            if (boundaryMapInstance) {
                boundaryMapInstance.remove();
                boundaryMapInstance = null;
            }
        }

        function initBoundaryMap(geometry) {
            destroyBoundaryMap();
            const el = document.getElementById("boundaryMap");
            if (!el || !geometry || !window.L) return;

            const map = L.map(el, { scrollWheelZoom: true });
            // ponytail: Leaflet 1.9.4 prefix ships UA-flag SVG — plain text only
            map.attributionControl.setPrefix("Leaflet");
            // ponytail: тайлы Яндекса в Leaflet не в WGS84 — контур НСПД уезжает на сотни метров;
            // Esri Street Map совпадает со спутником и геометрией EPSG:4326 из geo-utils.
            const scheme = L.tileLayer(
                "https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}",
                { maxZoom: 19, attribution: "© Esri" }
            );
            const satellite = L.tileLayer(
                "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
                { maxZoom: 19, attribution: "© Esri" }
            );
            satellite.addTo(map);
            L.control.layers({ "Схема": scheme, "Спутник": satellite }).addTo(map);

            const style = { color: "#21A038", weight: 3, fillColor: "#21A038", fillOpacity: 0.28 };
            if (geometry.type === "Point") {
                const [lon, lat] = geometry.coordinates || [];
                if (Number.isFinite(lon) && Number.isFinite(lat)) {
                    L.circleMarker([lat, lon], { radius: 8, color: "#21A038", fillColor: "#21A038", fillOpacity: 0.28, weight: 3 }).addTo(map);
                    map.setView([lat, lon], 15);
                }
            } else {
                const layer = L.geoJSON(geometry, { style });
                layer.addTo(map);
                const bounds = layer.getBounds();
                if (bounds?.isValid()) {
                    // ponytail: pad(0.4) — чуть дальше, чем fitBounds вплотную
                    map.fitBounds(bounds.pad(0.4), { maxZoom: 17 });
                }
            }
            boundaryMapInstance = map;
        }

        function renderBoundaryBlock(nspd) {
            const geometry = nspd?.geometry;
            if (geometry) {
                return `<div class="col-12">
                    <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-2">
                        <div class="info-label mb-0">Границы объекта на карте</div>
                        ${nspd.mapUrl
                            ? `<a class="btn btn-sm btn-outline-secondary" href="${escapeHtml(nspd.mapUrl)}" target="_blank" rel="noopener">Открыть на nspd.gov.ru</a>`
                            : ""}
                    </div>
                    <div id="boundaryMap" class="boundary-leaflet" role="region" aria-label="Интерактивная карта границ"></div>
                    <p class="boundary-map-hint text-muted mt-2 mb-0">Масштаб — колёсико или жест, перемещение — перетаскивание. Слой «Схема» / «Спутник» — в правом верхнем углу.</p>
                </div>`;
            }
            if (nspd?.boundaryPreview?.svg) {
                return `<div class="col-md-5 col-lg-4">
                    <div class="info-label mb-2">Контур объекта</div>
                    <div class="boundary-map mb-2">${nspd.boundaryPreview.svg}</div>
                    ${nspd.mapUrl ? `<a class="btn btn-sm btn-outline-secondary" href="${escapeHtml(nspd.mapUrl)}" target="_blank" rel="noopener">Открыть на nspd.gov.ru</a>` : ""}
                </div>`;
            }
            if (nspd?.mapUrl) {
                return `<div class="col-12">
                    <p class="boundary-fallback mb-2">Геометрия границ в ответе НСПД не найдена — откройте объект на публичной карте.</p>
                    <a class="btn btn-sm btn-outline-secondary" href="${escapeHtml(nspd.mapUrl)}" target="_blank" rel="noopener">Открыть на nspd.gov.ru</a>
                </div>`;
            }
            return "";
        }

        function renderRosreestr(data) {
            const rr = data.rosreestr;
            const obj = rr.object;
            const nspd = rr.nspd;
            if (!rr.found || !obj) {
                return `<h2 class="h5 mb-3">Росреестр (НСПД)</h2>
                    <p class="text-danger mb-0">${escapeHtml(rr.message || "Объект не найден")}</p>`;
            }
            const rows = [
                ["Адрес", obj.address],
                ["Тип объекта", obj.objectType || obj.category],
                ["Площадь", obj.area != null ? `${obj.area} ${obj.areaUnit || ""}` : null],
                ["Кадастровая стоимость", obj.cadastralValue != null ? Number(obj.cadastralValue).toLocaleString("ru-RU") + " ₽" : null],
                ["Кадастровый квартал", obj.quarterCadNumber],
                ["Форма собственности", obj.ownershipType],
                ["Дата постановки на учёт", obj.registrationDate],
                ["Разрешённое использование", obj.permittedUse],
                ["Статус", obj.status]
            ].filter(([, v]) => v);

            const boundaryHtml = renderBoundaryBlock(nspd || { geometry: obj.geometry });
            const related = ((nspd?.relatedObjects) || []).filter((r) => r.cadastralNumber !== data.cadastralNumber);
            const relatedHtml = related.length
                ? `<div class="mt-4">
                    <div class="info-label mb-2">Связанные объекты (НСПД)</div>
                    <ul class="related-kn-list small mb-0">${related.map((r) =>
                        `<li><strong>${escapeHtml(r.cadastralNumber)}</strong>${r.group ? ` <span class="text-muted">— ${escapeHtml(r.group)}</span>` : ""}</li>`
                    ).join("")}</ul>
                   </div>`
                : "";

            return `<h2 class="h5 mb-3"><i class="fa-solid fa-landmark me-2 text-success"></i>Данные из Росреестра</h2>
                <p class="text-muted mb-3">Кадастровый номер: <strong>${escapeHtml(data.cadastralNumber)}</strong></p>
                <div class="row g-3 align-items-start">
                    <div class="col-12">
                        <div class="row g-3">${rows.map(([label, value]) => `
                            <div class="col-md-6">
                                <div class="info-label">${escapeHtml(label)}</div>
                                <div>${escapeHtml(value)}</div>
                            </div>`).join("")}
                        </div>
                        ${relatedHtml}
                    </div>
                    ${boundaryHtml}
                </div>`;
        }

        function renderPanoramaPhotoCard(photo) {
            const is2gis = String(photo.imageSource || "").startsWith("2gis");
            const badgeClass = is2gis ? "source-2gis" : "source-yandex";
            const imageSrc = photo.imageUrl
                ? `${escapeHtml(resolveMediaUrl(photo.imageUrl))}?t=${Date.now()}`
                : null;
            const openBtn = photo.pageUrl
                ? `<a class="btn btn-sm btn-outline-secondary" href="${escapeHtml(photo.pageUrl)}" target="_blank" rel="noopener">Открыть</a>`
                : "";
            const body = imageSrc
                ? `<a href="${escapeHtml(photo.pageUrl || imageSrc)}" target="_blank" rel="noopener">
                    <img class="panorama-photo" src="${imageSrc}" alt="${escapeHtml(photo.caption || photo.sourceLabel)}">
                   </a>`
                : `<p class="text-muted small mb-0">${escapeHtml(photo.error || "Фото не получено")}</p>`;
            const meta = [
                photo.screenshotCached ? "из кэша" : null,
                photo.status === "error" ? null : photo.caption
            ].filter(Boolean).join(" · ");

            return `<div class="panorama-card">
                <div class="panorama-card-title">
                    <span class="source-badge ${badgeClass}">${escapeHtml(photo.sourceLabel || (is2gis ? "2ГИС" : "Яндекс Карты"))}</span>
                    ${openBtn}
                </div>
                ${body}
                ${meta ? `<p class="text-muted small mt-2 mb-0">${escapeHtml(meta)}</p>` : ""}
            </div>`;
        }

        function renderPanorama(panorama) {
            if (!panorama) {
                return `<div class="panorama-block">
                    <div class="info-label mb-2">Фото объекта</div>
                    <p class="text-muted small mb-0">Координаты объекта недоступны — фото получить нельзя.</p>
                </div>`;
            }

            const coords = panorama.lat != null && panorama.lon != null
                ? ` (${Number(panorama.lat).toFixed(5)}, ${Number(panorama.lon).toFixed(5)})`
                : "";

            const photos = Array.isArray(panorama.photos) && panorama.photos.length
                ? panorama.photos
                : panorama.imageUrl
                  ? [{
                        imageUrl: panorama.imageUrl,
                        imageSource: panorama.imageSource,
                        sourceLabel: panorama.sourceLabel,
                        pageUrl: panorama.dgisUrl || panorama.mapsUrl,
                        caption: panorama.sourceLabel,
                        screenshotCached: panorama.screenshotCached,
                        status: "ok"
                    }]
                  : [];

            const cards = photos.length
                ? `<div class="panorama-duo">${photos.map(renderPanoramaPhotoCard).join("")}</div>`
                : `<p class="text-muted small mb-0">${escapeHtml(panorama.error || "Фото не получено")}</p>`;

            return `<div class="panorama-block">
                <div class="info-label mb-2"><i class="fa-solid fa-camera me-1"></i>Фото объекта</div>
                ${cards}
                ${coords ? `<p class="text-muted small mt-2 mb-0">Координаты${coords}</p>` : ""}
            </div>`;
        }

        function renderLinks(links) {
            return [
                ["БазаЦООП", links.bazacoop || "https://bazacoop.ru/cadastral", "bazacoop"]
            ].map(([label, url, cls]) =>
                `<a class="btn btn-outline-secondary btn-sm" href="${escapeHtml(url)}" target="_blank" rel="noopener">
                    <span class="source-badge source-${cls} me-1">${label}</span> Открыть поиск
                </a>`
            ).join("");
        }

        function renderSourceUnavailable(notice, searchLinks, id = "") {
            if (!notice) return "";
            const label = SOURCE_LABELS[notice.source] || notice.source;
            const linkUrl = searchLinks?.[notice.source];
            const linkBtn = linkUrl
                ? `<a class="btn btn-sm btn-outline-secondary ms-2" href="${escapeHtml(linkUrl)}" target="_blank" rel="noopener">Открыть поиск на ${escapeHtml(label)}</a>`
                : "";
            const idAttr = id ? ` id="${escapeHtml(id)}"` : "";
            return `<div class="alert alert-info py-2 small mb-3"${idAttr} data-source-unavailable="${escapeHtml(notice.source)}">
                <i class="fa-solid fa-circle-info me-1"></i>
                <strong>${escapeHtml(label)}:</strong> ${escapeHtml(notice.message)}${linkBtn}
            </div>`;
        }

        function renderListing(item) {
            const photos = (item.photos || []).slice(0, 6);
            const photoHtml = photos.length
                ? `<div class="photo-strip mt-3">${photos.map((u) => {
                    const src = resolveMediaUrl(u);
                    return `<a href="${escapeHtml(src)}" target="_blank" rel="noopener"><img src="${escapeHtml(src)}" alt="фото" loading="lazy" referrerpolicy="no-referrer"></a>`;
                }).join("")}</div>`
                : `<p class="text-muted small mt-2 mb-0">Фотографии не найдены</p>`;

            const relevance = item.relevance?.reasons?.length
                ? `<div class="relevance mt-2"><i class="fa-solid fa-bullseye me-1"></i>${escapeHtml(item.relevance.reasons.join(", "))}</div>`
                : "";
            const streetBadge =
                item.matchedBy === "street"
                    ? `<span class="badge bg-info-subtle text-dark ms-1">на той же улице</span>`
                    : "";

            return `<article class="card-panel listing-card p-4 mb-3">
                <div class="d-flex flex-wrap justify-content-between align-items-start gap-2">
                    <div>
                        <span class="source-badge source-${escapeHtml(item.source)}">${escapeHtml(SOURCE_LABELS[item.source] || item.source)}</span>${streetBadge}
                        <h3 class="h6 mt-2 mb-1">${escapeHtml(item.title)}</h3>
                        ${item.address ? `<p class="text-muted small mb-0"><i class="fa-solid fa-location-dot me-1"></i>${escapeHtml(item.address)}</p>` : ""}
                    </div>
                    <div class="text-end">
                        <div class="price-tag">${escapeHtml(item.priceFormatted || "Цена не указана")}</div>
                        ${item.url ? `<a href="${escapeHtml(item.url)}" target="_blank" rel="noopener" class="btn btn-sm btn-outline-primary mt-2">Открыть объявление</a>` : ""}
                    </div>
                </div>
                ${item.description ? `<p class="mt-3 mb-0" style="white-space:pre-wrap">${escapeHtml(item.description)}</p>` : ""}
                ${photoHtml}
                ${relevance}
            </article>`;
        }

        function renderListingsHeader(stats, note) {
            const meta = note ? `<div class="alert alert-info">${escapeHtml(note)}</div>` : "";
            const statsHtml = stats
                ? `<p class="text-muted small" id="listingsStats">Найдено объявлений: ${stats.matched || 0}
                (БазаЦООП: ${stats.bySource?.bazacoop || 0})</p>`
                : `<p class="text-muted small" id="listingsStats">Ищем объявления…</p>`;
            return meta + statsHtml;
        }

        function updateProgress() {
            const parts = Object.entries(SOURCE_PROGRESS).map(([key, label]) => {
                const state = progressState[key];
                if (state === "done") return `<span class="source-done">${label} ✓</span>`;
                if (state === "pending") return `<span class="source-pending">${label}…</span>`;
                return "";
            }).filter(Boolean);
            searchStatusText.innerHTML = parts.join(" · ") || "Подключаемся к источникам…";
            setSearchPhrase(currentSearchPhase());
        }

        function showPanoramaLoading() {
            const block = document.getElementById("panoramaBlock");
            block.classList.remove("d-none");
            block.innerHTML = `<div class="info-label mb-2"><i class="fa-solid fa-camera me-1"></i>Фото объекта</div>
                <div class="d-flex align-items-center gap-2 text-muted"><div class="spinner-border spinner-border-sm text-success"></div>Получаем фото 2ГИС и панораму Яндекс Карт…</div>`;
        }

        async function consumeSearchStream(response) {
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = "";
            const state = { listings: [], sourceNotices: [], searchLinks: null, stats: null, meta: {} };

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split("\n");
                buffer = lines.pop() || "";

                for (const line of lines) {
                    if (!line.trim()) continue;
                    const chunk = JSON.parse(line);
                    await handleStreamChunk(chunk, state);
                }
            }
            if (buffer.trim()) {
                const chunk = JSON.parse(buffer);
                await handleStreamChunk(chunk, state);
            }
            return state;
        }

        async function handleStreamChunk(chunk, state) {
            if (chunk.event === "error") throw new Error(chunk.error || "Ошибка поиска");

            if (chunk.event === "status" && chunk.data?.message) {
                searchStatusText.textContent = chunk.data.message;
                if (chunk.data.phase) setSearchPhrase(chunk.data.phase === "nspd" ? "start" : chunk.data.phase);
            }

            if (chunk.event === "rosreestr") {
                progressState.rosreestr = "done";
                ["panorama", "bazacoop"].forEach((k) => { progressState[k] = "pending"; });
                updateProgress();
                results.classList.remove("d-none");
                document.getElementById("rosreestrBlock").innerHTML = renderRosreestr(chunk.data);
                const boundaryGeometry =
                    chunk.data?.rosreestr?.nspd?.geometry || chunk.data?.rosreestr?.object?.geometry;
                requestAnimationFrame(() => initBoundaryMap(boundaryGeometry));
                state.searchLinks = chunk.data.searchLinks;
                document.getElementById("linksBlock").innerHTML = renderLinks(chunk.data.searchLinks);
                document.getElementById("listingsBlock").innerHTML = renderListingsHeader(null) +
                    `<div class="card-panel p-4 text-center text-muted" id="listingsPlaceholder">
                        <div class="spinner-border spinner-border-sm text-success mb-2"></div>
                        <p class="mb-0 small">Ожидаем объявления из БазаЦООП…</p>
                    </div>`;
                showPanoramaLoading();
            }

            if (chunk.event === "panorama") {
                progressState.panorama = "done";
                updateProgress();
                const block = document.getElementById("panoramaBlock");
                block.classList.remove("d-none");
                block.innerHTML = renderPanorama(chunk.data.panorama);
            }

            if (chunk.event === "listings") {
                if (!LISTING_SOURCES.has(chunk.data.source)) return;
                progressState[chunk.data.source] = "done";
                updateProgress();
                state.listings.push(...chunk.data.listings);
                if (chunk.data.unavailable) {
                    state.sourceNotices.push(chunk.data.unavailable);
                }
                state.stats = chunk.data.stats;
                const placeholder = document.getElementById("listingsPlaceholder");
                if (placeholder) placeholder.remove();
                const header = document.getElementById("listingsStats");
                if (header) {
                    header.outerHTML = renderListingsHeader(state.stats, state.meta.note);
                }
                const container = document.getElementById("listingsBlock");
                if (chunk.data.unavailable) {
                    const noticeId = `unavailable-${chunk.data.source}`;
                    if (!document.getElementById(noticeId)) {
                        container.insertAdjacentHTML("beforeend",
                            renderSourceUnavailable(chunk.data.unavailable, state.searchLinks, noticeId));
                    }
                }
                for (const item of chunk.data.listings) {
                    container.insertAdjacentHTML("beforeend", renderListing(item));
                }
                if (!chunk.data.listings.length && chunk.data.errors?.length && !chunk.data.unavailable) {
                    container.insertAdjacentHTML("beforeend",
                        `<div class="alert alert-warning py-2 small">${escapeHtml(SOURCE_LABELS[chunk.data.source] || chunk.data.source)}: ${chunk.data.errors.map(escapeHtml).join("; ")}</div>`);
                }
            }

            if (chunk.event === "done") {
                state.stats = chunk.data.stats;
                state.meta = chunk.data.meta || {};
                for (const notice of chunk.data.meta?.sourceNotices || []) {
                    if (!state.sourceNotices.some((n) => n.source === notice.source)) {
                        state.sourceNotices.push(notice);
                    }
                }
                ["panorama", "bazacoop"].forEach((k) => {
                    if (progressState[k] === "pending") progressState[k] = "done";
                });
                updateProgress();
                const placeholder = document.getElementById("listingsPlaceholder");
                if (placeholder) placeholder.remove();
                const header = document.getElementById("listingsStats");
                if (header) {
                    header.outerHTML = renderListingsHeader(state.stats, state.meta.note);
                }
                if (!state.listings.length) {
                    document.getElementById("listingsBlock").insertAdjacentHTML("beforeend",
                        `<div class="card-panel p-4 text-center text-muted">
                            <i class="fa-regular fa-folder-open fa-2x mb-3"></i>
                            <p class="mb-2">Объявления о продаже не найдены в БазаЦООП.</p>
                            <p class="small mb-0">Используйте ссылку поиска выше.</p>
                        </div>`);
                }
            }
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const cadastralNumber = document.getElementById("cadastralInput").value.trim();
            if (!cadastralNumber) return;

            alertBox.innerHTML = "";
            destroyBoundaryMap();
            progressState = {};
            searchStatus.classList.add("active");
            searchStatusText.textContent = "Подключаемся к источникам…";
            startPhraseRotation();
            results.classList.add("d-none");
            document.getElementById("panoramaBlock").classList.add("d-none");
            document.getElementById("panoramaBlock").innerHTML = "";
            document.getElementById("searchBtn").disabled = true;

            try {
                const res = await fetch(`${API_BASE}/api/cadastral/search/stream`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ cadastralNumber })
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.error || `HTTP ${res.status}`);
                }
                await consumeSearchStream(res);
            } catch (err) {
                showAlert("danger", escapeHtml(err.message || "Ошибка поиска"));
            } finally {
                stopPhraseRotation();
                searchStatus.classList.remove("active");
                document.getElementById("searchBtn").disabled = false;
            }
        });

        const params = new URLSearchParams(location.search);
        if (params.get("kn")) {
            document.getElementById("cadastralInput").value = params.get("kn");
        }
    </script>
</body>
</html>
